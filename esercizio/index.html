<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-libreria — Settimana VII Giorno I</title>
    <link rel="stylesheet" type="text.css" href="assets/css/style.css">
</head>

<body>

    <header class="site-header">
        <h1>La mia libreria</h1>
        <p>Aggiungi i tuoi libri e segnali come letti.</p>
    </header>

    <main class="container">

        <section class="cerca-section">
            <h2>Cerca</h2>
            <div class="campo">
                <label for="cerca"></label>
                <input type="text" id="cerca" placeholder="es. harari, tolkien...">
            </div>
            <div id="spinner" class="spinner" hidden>Caricamento in corso...</div>
            <div id="errore" class="alert alert-danger" hidden></div>
            <ul id="risultati" class="risultati"></ul>
        </section>

        <section class="lista-section">
            <div class="lista-header">
                <h2>I tuoi libri (<span id="contatore">0</span>)</h2>
                <button id="svuota-tutto" class="btn-svuota">Svuota tutto</button>
            </div>
            <p class="info-storage">I libri sono salvati nel browser e sopravvivono al refresh.</p>
            <ul id="lista-libri" class="lista-libri">
                <!-- popolato da JavaScript -->
            </ul>
        </section>

    </main>

    <script src="assets/js/script.js"></script>
</body>

</html>
