<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-libreria — Settimana VII Giorno I</title>
    <link rel="stylesheet" type="text.css" href="assets/css/style.css">
  </head>
  <body>

    <header class="site-header">
      <h1>La mia libreria</h1>
      <p>Aggiungi i tuoi libri e segnali come letti.</p>
    </header>

    <main class="container">

      <section class="form-section">
        <h2>Aggiungi un libro</h2>
        <form id="aggiungi-libro" class="form">

          <div class="campo">
            <label for="titolo">Titolo</label>
            <input type="text" id="titolo" name="titolo" required>
          </div>

          <div class="campo">
            <label for="autore">Autore</label>
            <input type="text" id="autore" name="autore" required>
          </div>

          <div class="campo">
            <label for="anno">Anno</label>
            <input type="number" id="anno" name="anno" required>
          </div>

          <div class="campo">
            <label for="formato">Formato</label>
            <select id="formato" name="formato">
              <option value="cartaceo">Cartaceo</option>
              <option value="digitale">Digitale</option>
            </select>
          </div>

          <div class="campo campo-condizionale" id="campo-dimensione" hidden>
            <label for="dimensione">Dimensione (MB)</label>
            <input type="number" id="dimensione" name="dimensione" step="0.1">
          </div>

          <button type="submit" class="btn-primary">Aggiungi</button>
        </form>
      </section>

      <section class="lista-section">
        <div class="lista-header">
          <h2>I tuoi libri (<span id="contatore">0</span>)</h2>
          <button id="svuota-tutto" class="btn-svuota">Svuota tutto</button>
        </div>
        <p class="info-storage">I libri sono salvati nel browser e sopravvivono al refresh.</p>
        <ul id="lista-libri" class="lista-libri">
          <!-- popolato da JavaScript -->
        </ul>
      </section>

    </main>

    <script src="assets/js/script.js"></script>
  </body>
</html>
